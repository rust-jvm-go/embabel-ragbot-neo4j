# ============================================================================
# Embabel Agent Configuration (application.properties)
# ============================================================================
# This file provides overridable Embabel settings. Values here are merged with
# application.yml (yml takes precedence for duplicate keys).
#
# For the primary model configuration, see application.yml.
# ============================================================================

# --- Default LLM and Embedding Model ---
# Override the default LLM used when ai.withDefaultLlm() is called.
# Also used as fallback when ai.withAutoLlm() cannot determine a better model.
#embabel.models.default-llm=llama3.1:8b
#embabel.models.default-embedding-model=nomic-embed-text:latest

# --- LLM Roles ---
# Define named roles that can be referenced in code via ai.withLlmByRole("role-name").
# This enables cost optimization: use a cheap model for simple tasks and a powerful
# model for complex ones, without hardcoding model names in agent code.
#embabel.models.llms.best=llama3.1:8b
#embabel.models.llms.cheapest=llama3.1:8b

# --- Embedding Service Roles ---
# Named embedding services, used via ai.withEmbeddingService("role-name").
#embabel.models.embedding-services.best=nomic-embed-text:latest
#embabel.models.embedding-services.cheapest=nomic-embed-text:latest

# --- Agent Platform Ranking LLM ---
# The LLM used by the platform to rank and select agents in Closed/Open mode.
# If not set, the platform uses the default LLM. Set this to a fast, cheap model
# to avoid using an expensive model for agent selection.
#embabel.agent-platform.ranking.llm=llama3.1:8b

# --- Logging Personality ---
# Embabel supports themed logging personalities that add flavor to agent event logs.
# Available: starwars, severance, colossus, montypython, hh (Hitchhiker's Guide)
# If none is set, Embabel uses vanilla logging.
embabel.agent.logging.personality=starwars
